name: Booking Platform CI/CD Pipeline

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      service:
        description: "Service to deploy (leave blank for all changed)"
        required: false
        default: ""
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/booking-platform
  JAVA_VERSION: "17"
  # WHY MAVEN_OPTS: Set memory limits for Maven in CI
  MAVEN_OPTS: -Xmx1g -XX:+UseG1GC

# ─────────────────────────────────────────────────────────────
# JOB 1: Detect Changed Services
# WHY: Skip building services that haven't changed.
#      A typo fix in notification-service shouldn't rebuild all 6.
# ─────────────────────────────────────────────────────────────
jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      identity-service: ${{ steps.filter.outputs.identity-service }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes per service
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
              - 'pom.xml'
            auth-service:
              - 'auth-service/**'
              - 'pom.xml'
            

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Test — Matrix across changed services
  # WHY matrix: All tests run in parallel. Total test time =
  #              max(individual service test times), not sum.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false   # WHY false: Don't cancel other tests if one fails
      matrix:
        include:
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs.api-gateway }}
          - service: identity-service
            changed: ${{ needs.detect-changes.outputs.identity-service }}

    # WHY conditional: Only run if service has changes (or manual trigger)
    if: ${{ matrix.changed == 'true' || github.event_name == 'workflow_dispatch' }}

    services:
      # WHY PostgreSQL in CI: Integration tests need a real DB.
      # H2 in-memory DB is used for unit tests, but PostgreSQL
      # catches dialect-specific issues (JSON queries, TIMESTAMP WITH TZ).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          # WHY cache maven: Downloads all dependencies once per runner.
          # Subsequent runs reuse the cache — ~3 minutes saved per job.
          cache: maven

      - name: Run Unit Tests
        run: |
          cd ${{ matrix.service }}
          mvn test -B --no-transfer-progress \
            -Dspring.datasource.url=jdbc:h2:mem:testdb \
            -Dspring.jpa.hibernate.ddl-auto=create-drop

      - name: Run Integration Tests
        run: |
          cd ${{ matrix.service }}
          mvn verify -B --no-transfer-progress \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/test_db \
            -Dspring.datasource.username=postgres \
            -Dspring.datasource.password=testpassword \
            -Dspring.data.redis.host=localhost \
            -Dspring.data.redis.port=6379 \
            -Djwt.secret=test-secret-key-minimum-32-chars-required \
            -P integration-tests
        env:
          SPRING_PROFILES_ACTIVE: test

      # WHY JaCoCo coverage reporting in CI:
      # Enforces minimum coverage thresholds. A PR that reduces
      # coverage below 80% is blocked until tests are added.
      # Prevents gradual test coverage erosion over time.
      - name: Generate Test Coverage Report
        run: |
          cd ${{ matrix.service }}
          mvn jacoco:report -B --no-transfer-progress

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.service }}/target/site/jacoco/jacoco.xml
          flags: ${{ matrix.service }}
          fail_ci_if_error: false   # Don't fail build on coverage upload errors

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()   # Publish even on test failures
        with:
          files: ${{ matrix.service }}/target/surefire-reports/*.xml

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Security Scanning
  # WHY: Detect vulnerabilities BEFORE deployment.
  # OWASP Dependency Check scans Maven dependencies for known CVEs.
  # Trivy scans the built Docker image for OS + library CVEs.
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs.api-gateway }}
          - service: identity-service
            changed: ${{ needs.detect-changes.outputs.identity-service }}

    if: ${{ matrix.changed == 'true' && github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # WHY OWASP Dependency Check:
      # Maven dependencies may contain known CVEs (e.g., Log4Shell was
      # a Maven dependency CVE). This scan catches vulnerabilities
      # in the dependency tree before they reach production.
      - name: OWASP Dependency Check
        run: |
          cd ${{ matrix.service }}
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionsLocation=../.owasp-suppressions.xml \
            -B --no-transfer-progress
        continue-on-error: false   # FAIL build on HIGH/CRITICAL CVEs

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report-${{ matrix.service }}
          path: ${{ matrix.service }}/target/dependency-check-report.html

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Build & Push Docker Images
  # WHY: Creates immutable, tagged images for deployment.
  # Image tag = commit SHA for exact traceability:
  # "which code is running in production?" → look up the tag.
  # ─────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, test]

    # WHY permissions write for packages:
    # GHCR (GitHub Container Registry) requires write permission
    # to push images. This is explicitly scoped to packages only.
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs.api-gateway }}
          - service: identity-service
            changed: ${{ needs.detect-changes.outputs.identity-service }}


    if: ${{ matrix.changed == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests -B --no-transfer-progress

      # WHY Docker Buildx + BuildKit:
      # BuildKit enables parallel multi-stage builds, layer caching,
      # and better build performance vs legacy builder.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # WHY multiple image tags:
      # - SHA tag: exact version for traceability ("what's deployed?")
      # - Branch tag: latest version of a branch (useful for staging)
      # - Version tag: semantic version for release artifacts
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # WHY cache-from/to GitHub Actions cache:
          # Docker layer caching across builds. Unchanged layers
          # (e.g., dependencies) are reused — 50-70% faster builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the final image for CVEs
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"   # Fail build on CRITICAL/HIGH image CVEs

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Deploy to Staging
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-push]
    if: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    environment:
      name: staging
      url: https://staging-api.booking-platform.com

    steps:
      - uses: actions/checkout@v4

      # WHY OIDC for cloud auth (not long-lived credentials):
      # Static cloud credentials in GitHub Secrets can be leaked.
      # OIDC generates short-lived tokens (15 minutes) that are
      # automatically rotated. No credential to leak.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-booking-platform
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for staging cluster
        run: |
          aws eks update-kubeconfig \
            --name booking-platform-staging \
            --region ${{ secrets.AWS_REGION }}

      - name: Apply K8s manifests to staging
        run: |
          # Apply infrastructure (idempotent)
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/rbac.yml
          kubectl apply -f k8s/configmaps/
          kubectl apply -f k8s/infrastructure.yml

          # Apply all service deployments
          for svc in api-gateway identity-service; do
            kubectl apply -f k8s/$svc/deployment.yml -n booking-platform
          done

      - name: Update image tags for staging
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          for svc in api-gateway identity-service; do
            kubectl set image deployment/$svc \
              $svc=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:sha-${SHORT_SHA} \
              -n booking-platform
          done

      - name: Wait for rollout to complete
        run: |
          for svc in api-gateway identity-service; do
            echo "Waiting for $svc rollout..."
            kubectl rollout status deployment/$svc -n booking-platform --timeout=300s
          done

      - name: Smoke test staging deployment
        run: |
          sleep 30  # Allow services to fully initialize
          curl -f https://staging-api.booking-platform.com/actuator/health || \
            (echo "Smoke test FAILED" && exit 1)

  # ─────────────────────────────────────────────────────────────
  # JOB 6: Deploy to Production (manual approval gate)
  # WHY required reviewers on production environment:
  # No code goes to production without explicit human approval.
  # This prevents accidental production deployments and provides
  # an audit trail of who approved each production release.
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: production
      url: https://api.booking-platform.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-booking-platform-prod
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for production cluster
        run: |
          aws eks update-kubeconfig \
            --name booking-platform-production \
            --region ${{ secrets.AWS_REGION }}

      - name: Apply K8s manifests to production
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/rbac.yml
          kubectl apply -f k8s/configmaps/
          kubectl apply -f k8s/infrastructure.yml
          for svc in api-gateway identity-service; do
            kubectl apply -f k8s/$svc/deployment.yml -n booking-platform
          done

      - name: Update image tags for production
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          for svc in api-gateway identity-service; do
            kubectl set image deployment/$svc \
              $svc=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:sha-${SHORT_SHA} \
              -n booking-platform
          done

      - name: Wait for production rollout
        run: |
          for svc in api-gateway identity-service; do
            kubectl rollout status deployment/$svc -n booking-platform --timeout=300s
          done

      - name: Production smoke test
        run: |
          sleep 30
          curl -f https://api.booking-platform.com/actuator/health || \
            (echo "Production smoke test FAILED — initiating rollback" && \
             kubectl rollout undo deployment --all -n booking-platform && exit 1)

      # WHY Slack notification on production deploy:
      # Real-time awareness for operations teams when production changes.
      # If something breaks after deployment, the team knows immediately
      # WHO deployed WHAT and can correlate with alerts.
      - name: Notify team on Slack
        uses: slackapi/slack-github-action@v1.26.0
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} booking platform Production Deploy: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Booking Platform — Production Deployment*\n*Status:* ${{ job.status }}\n*Commit:* ${{ github.sha }}\n*Deployed by:* ${{ github.actor }}\n*Time:* ${{ github.run_started_at }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
