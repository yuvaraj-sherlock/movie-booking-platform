apiVersion: v1
kind: Secret
metadata:
  name: booking-platform-secrets
  namespace: booking-platform
  annotations:
    # Annotation for External Secrets Operator (if used)
    secret-store: vault-backend
type: Opaque
data:
  # JWT signing key (minimum 32 chars for HS256)
  # Generate: openssl rand -base64 48 | base64
  JWT_SECRET: Y2hhbmdlbWUtaW4tcHJvZHVjdGlvbi1taW5pbXVtLTMyLWNoYXJzLXJlcXVpcmVk

  # Database password
  DB_PASSWORD: Y2hhbmdlbWU=

  # Redis password (if Redis AUTH is enabled)
  REDIS_PASSWORD: ""

  # SMTP credentials for notification-service
  SMTP_PASSWORD: Y2hhbmdlbWU=

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: booking-platform
type: Opaque
data:
  # PostgreSQL superuser password
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  # Application user password
  APP_PASSWORD: Y2hhbmdlbWU=
