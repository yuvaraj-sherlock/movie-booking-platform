apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: booking-platform
data:
  SERVER_PORT: "8080"
  LOG_LEVEL: "INFO"
  GATEWAY_LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  CORS_ALLOWED_ORIGINS: "https://booking-platform.com,https://app.booking-platform.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  namespace: booking-platform
data:
  SERVER_PORT: "8081"
  DB_URL: "jdbc:postgresql://postgres-service:5432/auth_db"
  DB_USERNAME: "test_user"
  DB_POOL_MAX: "10"
  JPA_DDL_AUTO: "validate"
  JPA_SHOW_SQL: "false"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
